# Shared xnet process config. The process name can be overridden by:
#   xnet.exe demo/xnats_main.lua SERVER_NAME=game1
#   xnet.exe demo/xnats_main.lua SERVER_NAME=game2

# SERVER_NAME=game1
# Linux only: run xnet as a background daemon. CLI can override with DAEMON=1,
# -d, or --daemon.
DAEMON=0

# If debugging with multiple processes, please use the process startup parameters
# refer to the project documentation.
XDEBUG_BOOT=1 
XDEBUG_PORT=19090 

NATS_HOST=127.0.0.1
NATS_PORT=4222
NATS_PREFIX=xnet.test
NATS_TEST_DELAY_SEC=5
NATS_TEST_TIMEOUT_SEC=30
# Empty means: hold 10 seconds when NATS_TEST_PEER is set, otherwise exit immediately.
NATS_TEST_HOLD_SEC=
# Set to game2/game1 or auto when doing two-process manual RPC tests.
NATS_TEST_PEER=

HTTP_ENABLE=1
HTTP_HOST=127.0.0.1
HTTP_PORT=18080
HTTP_WORKERS=2

HTTPS_ENABLE=1
HTTPS_PORT=18443
HTTPS_CERT=demo/certs/server.crt
HTTPS_KEY=demo/certs/server.key
HTTPS_KEY_PASSWORD=
HTTPS_TEST_SECONDS=15

# xadmin web console (scripts/xadmin/xadmin_main.lua).
# Each instance MUST be started with a unique SERVER_NAME, e.g.
#   bin/xnet scripts/xadmin/xadmin_main.lua SERVER_NAME=xadmin1
#   bin/xnet scripts/xadmin/xadmin_main.lua SERVER_NAME=xadmin2 XADMIN_PORT=18091
XADMIN_HOST=127.0.0.1
XADMIN_PORT=18090
XADMIN_HTTPS=0
XADMIN_STATIC_DIR=scripts/xadmin/static
# Empty = no auth. Set to a long random string to require X-Xadmin-Token header.
XADMIN_TOKEN=
# Master bypass token: any request carrying it (X-Xadmin-Super-Token or
# X-Xadmin-Token header) skips login entirely, even before setup. Empty disables
# it. Keep it secret and prefer HTTPS -- it grants unconditional access.
XADMIN_SUPER_TOKEN=
XADMIN_HEARTBEAT_MS=5000
XADMIN_PEER_TTL_MS=15000
# xadmin account/session database (MySQL). Leave these empty to configure the DB
# through the web setup page (persisted to xadmin_db.json). When a value is set
# here it OVERRIDES the JSON file per-field; when host+user+database are all set
# the setup page skips the DB form and only asks for the default admin account.
XADMIN_DB_HOST=
XADMIN_DB_PORT=
XADMIN_DB_USER=
XADMIN_DB_PASSWORD=
XADMIN_DB_DATABASE=

# ── xadmin OAuth2 / OIDC login (e.g. Google) ────────────────────────────────
# Enable per-provider via XADMIN_OAUTH_PROVIDERS (comma-separated). Endpoints
# are pinned below to skip OIDC discovery; or set only ..._ISSUER to discover.
# Outbound discovery/token/userinfo calls can go through a proxy (the xnet HTTP
# client is otherwise direct-connect): XADMIN_OAUTH_<NAME>_PROXY, or the global
# XADMIN_HTTP_PROXY fallback. socks5h:// = remote DNS (needed to reach Google
# from CN). USERNAME_FIELD=email + XADMIN_ADMINS=<email> makes the SSO user an
# admin (federated logins are viewer-only otherwise).
#XADMIN_OAUTH_PROVIDERS=google
#XADMIN_OAUTH_GOOGLE_CLIENT_ID=<id>.apps.googleusercontent.com
#XADMIN_OAUTH_GOOGLE_CLIENT_SECRET=<secret>
#XADMIN_OAUTH_GOOGLE_AUTH_URL=https://accounts.google.com/o/oauth2/v2/auth
#XADMIN_OAUTH_GOOGLE_TOKEN_URL=https://oauth2.googleapis.com/token
#XADMIN_OAUTH_GOOGLE_USERINFO_URL=https://openidconnect.googleapis.com/v1/userinfo
#XADMIN_OAUTH_GOOGLE_SCOPE=openid email profile
#XADMIN_OAUTH_GOOGLE_USERNAME_FIELD=email
#XADMIN_OAUTH_GOOGLE_PROXY=socks5h://127.0.0.1:1080
#XADMIN_HTTP_PROXY=socks5h://127.0.0.1:1080
#XADMIN_ADMINS=<your-gmail-address>

# Affinity gate/game sample topology.
# Gate owns one client+battle lane per worker; game battle lanes connect to
# GATE_INTERNAL_PORT + lane - 1. Counts must match.
GATE_CLIENT_HOST=127.0.0.1
GATE_CLIENT_PORT=19180
GATE_INTERNAL_HOST=127.0.0.1
GATE_INTERNAL_PORT=19181
GATE_WORKERS=6
GATE_HEARTBEAT_MS=5000

GAME_GATE_TARGET=
GAME_GATE_HOST=127.0.0.1
GAME_GATE_PORT=19181
GAME_BATTLE_WORKERS=6
GAME_WORK_WORKERS=2
GAME_NATS_RPC_TIMEOUT_MS=3000

REDIS_HOST=127.0.0.1
REDIS_PORT=6379
REDIS_DB=1

MYSQL_HOST=127.0.0.1
MYSQL_PORT=3306
MYSQL_USER=chib
MYSQL_PASSWORD=xqb111
MYSQL_DATABASE=

# ── xagent (LLM) ────────────────────────────────────────────────────────────
# Non-secret LLM config. The secret token goes in xagent.local.cfg (gitignored),
# NOT here. auth_style: x-api-key (Anthropic-style) or bearer.
#
# Multiple model profiles: the un-suffixed keys are the base profile; add more
# with a numeric suffix (…1, then …2, …). The GUI shows one TAB per profile and
# can run them concurrently. Each key on its own line. Optional XAGENT_NAME{N}
# sets the tab label (defaults to the model id). A numbered profile's token
# falls back to the shared XAGENT_AUTH_TOKEN when XAGENT_AUTH_TOKEN{N} is unset —
# tokens go in xagent.local.cfg, NOT here. Example second profile:
#   XAGENT_BASE_URL1=https://api.deepseek.com/anthropic
#   XAGENT_MODEL1=deepseek-v4-pro
#   XAGENT_AUTH_STYLE1=x-api-key
#   XAGENT_NAME1=deepseek            (optional)
#XAGENT_BASE_URL=https://api.deepseek.com/anthropic
#XAGENT_MODEL=deepseek-v4-pro

XAGENT_BASE_URL1=https://ark.cn-beijing.volces.com/api/coding
XAGENT_MODEL1=ark-code-latest
XAGENT_AUTH_STYLE1=x-api-key
