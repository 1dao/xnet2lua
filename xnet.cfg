# Shared xnet process config. The process name can be overridden by:
#   xnet.exe demo/xnats_main.lua SERVER_NAME=game1
#   xnet.exe demo/xnats_main.lua SERVER_NAME=game2

# SERVER_NAME=game1
# Linux only: run xnet as a background daemon. CLI can override with DAEMON=1,
# -d, or --daemon.
DAEMON=0

NATS_HOST=127.0.0.1
NATS_PORT=4222
NATS_PREFIX=xnet.test
NATS_TEST_DELAY_SEC=5
NATS_TEST_TIMEOUT_SEC=30
# Empty means: hold 10 seconds when NATS_TEST_PEER is set, otherwise exit immediately.
NATS_TEST_HOLD_SEC=
# Set to game2/game1 or auto when doing two-process manual RPC tests.
NATS_TEST_PEER=

HTTP_ENABLE=1
HTTP_HOST=127.0.0.1
HTTP_PORT=18080
HTTP_WORKERS=2

HTTPS_ENABLE=1
HTTPS_PORT=18443
HTTPS_CERT=demo/certs/server.crt
HTTPS_KEY=demo/certs/server.key
HTTPS_KEY_PASSWORD=
HTTPS_TEST_SECONDS=15

# xadmin web console (scripts/xadmin/xadmin_main.lua).
# Each instance MUST be started with a unique SERVER_NAME, e.g.
#   bin/xnet scripts/xadmin/xadmin_main.lua SERVER_NAME=xadmin1
#   bin/xnet scripts/xadmin/xadmin_main.lua SERVER_NAME=xadmin2 XADMIN_PORT=18091
XADMIN_HOST=127.0.0.1
XADMIN_PORT=18090
XADMIN_HTTPS=0
XADMIN_STATIC_DIR=scripts/xadmin/static
# Empty = no auth. Set to a long random string to require X-Xadmin-Token header.
XADMIN_TOKEN=
# Master bypass token: any request carrying it (X-Xadmin-Super-Token or
# X-Xadmin-Token header) skips login entirely, even before setup. Empty disables
# it. Keep it secret and prefer HTTPS -- it grants unconditional access.
XADMIN_SUPER_TOKEN=
XADMIN_HEARTBEAT_MS=5000
XADMIN_PEER_TTL_MS=15000
# xadmin account/session database (MySQL). Leave these empty to configure the DB
# through the web setup page (persisted to xadmin_db.json). When a value is set
# here it OVERRIDES the JSON file per-field; when host+user+database are all set
# the setup page skips the DB form and only asks for the default admin account.
XADMIN_DB_HOST=
XADMIN_DB_PORT=
XADMIN_DB_USER=
XADMIN_DB_PASSWORD=
XADMIN_DB_DATABASE=

# Affinity gate/game sample topology.
# Gate owns one client+battle lane per worker; game battle lanes connect to
# GATE_INTERNAL_PORT + lane - 1. Counts must match.
GATE_CLIENT_HOST=127.0.0.1
GATE_CLIENT_PORT=19180
GATE_INTERNAL_HOST=127.0.0.1
GATE_INTERNAL_PORT=19181
GATE_WORKERS=6
GATE_HEARTBEAT_MS=5000

GAME_GATE_TARGET=
GAME_GATE_HOST=127.0.0.1
GAME_GATE_PORT=19181
GAME_BATTLE_WORKERS=6
GAME_WORK_WORKERS=2
GAME_NATS_RPC_TIMEOUT_MS=3000

REDIS_HOST=127.0.0.1
REDIS_PORT=6379
REDIS_DB=1

MYSQL_HOST=127.0.0.1
MYSQL_PORT=3306
MYSQL_USER=chib
MYSQL_PASSWORD=xqb111
MYSQL_DATABASE=

