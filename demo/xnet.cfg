# Shared xnet process config. The process name can be overridden by:
#   xnet.exe demo/xnats_main.lua SERVER_NAME=game1
#   xnet.exe demo/xnats_main.lua SERVER_NAME=game2

SERVER_NAME=game1

NATS_HOST=127.0.0.1
NATS_PORT=4222
NATS_PREFIX=xnet.test
NATS_TEST_DELAY_SEC=5
NATS_TEST_TIMEOUT_SEC=30
# Empty means: hold 10 seconds when NATS_TEST_PEER is set, otherwise exit immediately.
NATS_TEST_HOLD_SEC=
# Set to game2/game1 or auto when doing two-process manual RPC tests.
NATS_TEST_PEER=

HTTP_ENABLE=1
HTTP_HOST=127.0.0.1
HTTP_PORT=18080
HTTP_WORKERS=2

HTTPS_ENABLE=0
HTTPS_PORT=18443
HTTPS_CERT=demo/certs/server.crt
HTTPS_KEY=demo/certs/server.key

REDIS_HOST=127.0.0.1
REDIS_PORT=6379
REDIS_DB=1

MYSQL_HOST=127.0.0.1
MYSQL_PORT=3306
MYSQL_USER=chib
MYSQL_PASSWORD=xqb111
MYSQL_DATABASE=
